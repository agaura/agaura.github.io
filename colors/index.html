		<h1 id="espan-stylefont-variantsmall-capsxperimental-stuffspan">E<span style="font-variant:small-caps;">xperimental stuff</span></h1>
<center><p style="font-size:30px; text-align:center"> $f$( <span id='red' style='color:black'>⬤</span> , <span id='green' style='color:black'>⬤</span> , <span id='blue' style='color:black'>⬤</span> ) = <span id='color' style='color:black'>⬤</span></p>
</center>
<html>
<svg id = "graph" width="600" height="350"></svg>
<style>
.line {
  fill: none;
  stroke: steelblue;
  stroke-width: 2px;
}
.axis line{
  stroke: #808080;
}
.axis path{
  stroke: #808080;
}
.axis text{
  fill: #808080;
}  
</style>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script>
function nearest_color(d, index) {
  left = Math.floor(index);
  right = Math.ceil(index);
  dL = index - left;
  return d[left].kW*(1-dL) + d[right].kW*dL;}
function decimalToHex(d, padding) {
    var hex = Number(d).toString(16);
    padding = typeof (padding) === "undefined" || padding === null ? padding = 2 : padding;
    while (hex.length < padding) {
        hex = "0" + hex;
    }
    return hex;
}

function specToColor(l) {
    r=0.0; g=0.0; b=0.0;
         if ((l>=390.0)&&(l<410.0)) { t=(l-390.0)/(410.0-390.0); r=    +(0.33*t)-(0.20*t*t); }
    else if ((l>=410.0)&&(l<475.0)) { t=(l-410.0)/(475.0-410.0); r=0.14         -(0.13*t*t); }
    else if ((l>=545.0)&&(l<595.0)) { t=(l-545.0)/(595.0-545.0); r=    +(1.98*t)-(     t*t); }
    else if ((l>=595.0)&&(l<650.0)) { t=(l-595.0)/(650.0-595.0); r=0.98+(0.06*t)-(0.40*t*t); }
    else if ((l>=650.0)&&(l<720.0)) { t=(l-650.0)/(720.0-650.0); r=0.65-(0.84*t)+(0.20*t*t); }
         if ((l>=415.0)&&(l<475.0)) { t=(l-415.0)/(475.0-415.0); g=             +(0.80*t*t); }
    else if ((l>=475.0)&&(l<590.0)) { t=(l-475.0)/(590.0-475.0); g=0.8 +(0.76*t)-(0.80*t*t); }
    else if ((l>=585.0)&&(l<639.0)) { t=(l-585.0)/(639.0-585.0); g=0.84-(0.84*t)           ; }
         if ((l>=390.0)&&(l<475.0)) { t=(l-390.0)/(475.0-390.0); b=    +(2.20*t)-(1.50*t*t); }
    else if ((l>=475.0)&&(l<560.0)) { t=(l-475.0)/(560.0-475.0); b=0.7 -(     t)+(0.30*t*t); }
    return {r, g, b};
    }

// photoreceptor dataset originally from https://www.physics.upenn.edu/biophys/PtN/Datasets/PtNdatasets.pdf
// now from http://www.cvrl.org/
var svg = d3.select("#graph"),
  margin = {top: 15, right: 10, bottom: 30, left: 30},
  width = +svg.attr("width") - margin.left - margin.right,
  height = +svg.attr("height") - margin.top - margin.bottom,
  g = svg.append("g").attr("transform", "translate(" + margin.left + "," + margin.top + ")");
var color = d3.scaleOrdinal()
  .domain(["Blue", "Green", "Red"])
  .range(["rgba(255, 0, 0, 0.30)", "rgba(0, 255, 0, 0.30)", "rgba(50, 50, 255, 0.30)"]);
var x = d3.scaleLinear().range([0, width]),
  y = d3.scaleLinear().range([height, 0]),
  z = color;
var area = d3.area()
  .curve(d3.curveMonotoneX)
  .x(function(d) { return x(d.wavelength); })
  .y0(y(0))
  .y1(function(d) { return y(d.kW); });
d3.csv('../other/responsecurves.csv', type, function(error, data) {
  if (error) throw error;
  var sources = data.columns.slice(1).map(function(id) {
    return {
      id: id,
      values: data.map(function(d) {
        return {wavelength: d.wavelength, kW: d[id]};
      })
    };
  });
  x.domain(d3.extent(data, function(d) { return d.wavelength; }));
  y.domain([
    0,
    d3.max(sources, function(c) { return d3.max(c.values, function(d) { return d.kW; }); })
  ]);
  z.domain(sources.map(function(c) { return c.id; }));
  g.append("g")
      .attr("class", "axis")
      .attr("transform", "translate(0," + height + ")")
      .call(d3.axisBottom(x))
      .append("text")
      .attr("text-anchor", "end")
      .attr("x", width)
      .attr("y", - 4)
      .attr("fill", "#808080B0")
    .text("Wavelength (nm)");
  g.append("text")
   .attr("x", width * 0.205)
   .attr("y", height * 0.1)
   .attr("text-anchor", "middle")
   .attr("fill", "#808080B0")
   .style("font-size", "12px")
   .text("S");
  g.append("text")
   .attr("x", width * 0.38)
   .attr("y", height * 0.1)
   .attr("text-anchor", "middle")
   .attr("fill", "#808080B0")
   .style("font-size", "12px")
   .text("M");
  g.append("text")
   .attr("x", width * 0.64)
   .attr("y", height * 0.1)
   .attr("text-anchor", "middle")
   .attr("fill", "#808080B0")
   .style("font-size", "12px")
   .text("L");
  g.append("g")
      .attr("class", "axis")
      .call(d3.axisLeft(y))
    .append("text")
      .attr("transform", "rotate(-90)")
      .attr("y", 6)
      .attr("dy", "0.71em")
      .attr("fill", "#808080B0")
      .text("Sensitivity");
  var source = g.selectAll(".area")
      .data(sources)
      .enter().append("g")
      .attr("class", function(d) { return `area ${d.id}`; })
  source.append("path")
       .attr("d", function(d) { return area(d.values); })
       .style("fill", function(d) { return z(d.id); });
  var vertical = g.append("line")
   .attr("y1", 0)
   .attr("y2", 300)
   .attr("x1", 0)
   .attr("x2", 0)
   .attr("stroke", "#7F7F7F50");
var red = g.append('circle')
  .attr('cx', 0)
  .attr('cy', 300)
  .attr('r', 6)
  .attr('stroke', 'gray')
  .attr('fill', '#000000A0');
var green = g.append('circle')
  .attr('cx', 0)
  .attr('cy', 300)
  .attr('r', 6)
  .attr('stroke', 'gray')
  .attr('fill', '#000000A0');
var blue = g.append('circle')
  .attr('cx', 0)
  .attr('cy', 283)
  .attr('r', 6)
  .attr('stroke', 'gray')
  .attr('fill', '#000000A0');
var final_color = g.append('circle')
  .attr('cx', 0)
  .attr('cy', -5)
  .attr('r', 6)
  .attr('stroke', 'gray')
  .attr('fill', '#000000A0');
  d3.select("#graph")
    .on("mousemove", function(){  
       //console.log("moved");
       mousex = d3.mouse(this);
       mousex = mousex[0] - margin.left;
       if (mousex > 0 && mousex < width)
        {vertical.attr("x2", mousex);
        vertical.attr("x1", mousex);
        red.attr("cx", mousex);
        new_red = nearest_color(sources[0].values,mousex*sources[0].values.length/width);
        red.attr("cy", (1-new_red)*300);
        green.attr("cx", mousex);
        new_green = nearest_color(sources[1].values,mousex*sources[1].values.length/width);
        green.attr("cy", (1-new_green)*300);
        blue.attr("cx", mousex);
        new_blue = nearest_color(sources[2].values,mousex*sources[2].values.length/width);
        blue.attr("cy", (1-new_blue)*300);
        final_color.attr("cx", mousex);
        red_color =  "#" + decimalToHex(parseInt(new_red*255)) + "0000";
        green_color = "#00" + decimalToHex(parseInt(new_green*255)) + "00";
        blue_color = "#0000" + decimalToHex(parseInt(new_blue*255));
        d3.select("#red").attr("style","color: " + red_color);
        d3.select("#green").attr("style","color: " + green_color);
        d3.select("#blue").attr("style","color: " + blue_color);
        red.attr("fill",red_color);
        green.attr("fill",green_color);
        blue.attr("fill",blue_color);
        rgb = specToColor(mousex*330/width+390);
        d3.select("#color").attr("style","color: #" + decimalToHex(parseInt(rgb.r*255)) + decimalToHex(parseInt(rgb.g*255)) + decimalToHex(parseInt(rgb.b*255)));
        final_color.attr("fill","#" + decimalToHex(parseInt(rgb.r*255)) + decimalToHex(parseInt(rgb.g*255)) + decimalToHex(parseInt(rgb.b*255)));
        vertical.attr("stroke","#" + decimalToHex(parseInt(rgb.r*255)) + decimalToHex(parseInt(rgb.g*255)) + decimalToHex(parseInt(rgb.b*255)));
        //blue.attr("cy", mousex);
        }})
    .on("mouseover", function(){  
       //console.log("moved");
       mousex = d3.mouse(this);
       mousex = mousex[0];
       if (mousex > margin.left && mousex < width + margin.left)
        {vertical.attr("x2", mousex - margin.left);
        vertical.attr("x1", mousex - margin.left)
        }});
});
function type(d, _, columns) {
  for (var i = 1, n = columns.length, c; i < n; ++i) d[c = columns[i]] = +d[c];
  return d;
}
    </script>
